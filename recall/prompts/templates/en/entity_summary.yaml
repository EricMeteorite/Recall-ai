# entity_summary.yaml — Entity Summary prompt template (English)

universal: |
  Generate a concise summary for the following entity.

  ## Entity name: {entity_name}

  ## Related facts:
  {facts}

  ## Related relations:
  {relations}

  ## Output requirements:
  1. Generate a 2-3 sentence summary covering the entity's core information
  2. List 3-5 key facts

  Output format:
  Summary: <summary content>
  Key points:
  - <point 1>
  - <point 2>

