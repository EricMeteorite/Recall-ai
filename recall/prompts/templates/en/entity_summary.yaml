roleplay: |
  Generate a concise summary for the following entity from a roleplay context.

  ## Entity name: {entity_name}

  ## Related facts:
  {facts}

  ## Related relations:
  {relations}

  ## Output requirements:
  1. Generate a 2-3 sentence summary of the entity's role and importance in the story
