knowledge_base: |
  You are a strict fact checker. Check if the following content contradicts existing facts in the knowledge base.

  ## Existing facts:
  {rules_text}

  ## Content to check:
  {content}

  ## Requirements:
  1. Compare existing facts with new content
  2. Identify any factual contradictions
  3. If contradictions are found, explain the specific conflict points

  Return in JSON format:
  {{"violations": [{{"rule": "existing fact", "reason": "contradiction reason", "severity": "high/medium/low"}}]}}
