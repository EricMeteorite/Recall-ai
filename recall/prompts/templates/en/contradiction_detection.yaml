# contradiction_detection.yaml — Contradiction Detection prompt template (English)

universal: |
  You are a strict rule checker. Check if the following content violates any rules.

  ## Rules (user-defined absolute rules, must be strictly followed):
  {rules_text}

  ## Content to check:
  {content}

  ## Requirements:
  1. Carefully understand the meaning of each rule (may be a long description)
  2. Determine if the content violates any rule
  3. If a violation is found, explain which rule was violated and why

  Return in JSON format:
  {{"violations": [{{"rule": "rule content", "reason": "violation reason", "severity": "high/medium/low"}}]}}

