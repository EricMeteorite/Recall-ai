# context_extraction.yaml — Persistent Context Extraction prompt template (English)

universal: |
  Analyze the following conversation and extract information that should be treated as "persistent context".

  [IMPORTANT]
  1. Only extract information explicitly mentioned or established in the conversation
  2. If the conversation is short or lacks clear background info, return an empty array []
  3. Extract key state changes, skills acquired, items obtained, relationship changes, etc.

  Conversation:
  {content}

  Return in JSON format:
  [{{"type": "state type", "description": "state description", "confidence": 0.9}}]

